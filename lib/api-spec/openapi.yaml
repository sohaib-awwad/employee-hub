openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: HR Employee Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: auth
    description: Login, logout, and current user
  - name: health
    description: Health operations
  - name: attendance
    description: Punch in/out and attendance history
  - name: leaves
    description: Leave requests and balances
  - name: holidays
    description: Public and company holidays
  - name: dashboard
    description: Dashboard summary
  - name: employees
    description: Employee profile
  - name: announcements
    description: Announcements and events
  - name: requests
    description: Employee correction and attendance requests
paths:
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out the current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently logged-in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "401":
          description: Not authenticated

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /employees/me:
    get:
      operationId: getMyProfile
      tags: [employees]
      summary: Get current employee profile
      responses:
        "200":
          description: Employee profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance history
      parameters:
        - name: month
          in: query
          schema:
            type: ["integer", "null"]
        - name: year
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/today:
    get:
      operationId: getTodayAttendance
      tags: [attendance]
      summary: Get today's attendance record
      responses:
        "200":
          description: Today's attendance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/punch-in:
    post:
      operationId: punchIn
      tags: [attendance]
      summary: Punch in
      responses:
        "200":
          description: Punched in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/punch-out:
    post:
      operationId: punchOut
      tags: [attendance]
      summary: Punch out
      responses:
        "200":
          description: Punched out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /leaves:
    get:
      operationId: listLeaves
      tags: [leaves]
      summary: List employee's leave requests
      responses:
        "200":
          description: Leave requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveRequest"
    post:
      operationId: createLeave
      tags: [leaves]
      summary: Apply for a leave
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveInput"
      responses:
        "201":
          description: Leave created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /leaves/balance:
    get:
      operationId: getLeaveBalance
      tags: [leaves]
      summary: Get leave balance summary
      responses:
        "200":
          description: Leave balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveBalance"

  /leaves/{id}:
    delete:
      operationId: cancelLeave
      tags: [leaves]
      summary: Cancel a leave request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leave cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /holidays:
    get:
      operationId: listHolidays
      tags: [holidays]
      summary: List holidays
      parameters:
        - name: year
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Holidays
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Holiday"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements and events
      parameters:
        - name: type
          in: query
          schema:
            type: ["string", "null"]
            enum: [announcement, event, null]
        - name: page
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: priority
          in: query
          schema:
            type: ["string", "null"]
            enum: [low, medium, high, null]
        - name: q
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Announcements list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnouncementsPage"

  /requests:
    get:
      operationId: listRequests
      tags: [requests]
      summary: List the current employee's requests
      responses:
        "200":
          description: Requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeRequest"
    post:
      operationId: createRequest
      tags: [requests]
      summary: Submit a correction or attendance request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestInput"
      responses:
        "201":
          description: Request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeRequest"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Employee:
      type: object
      required: [id, name, email, department, position, joinDate, avatarInitials, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        department:
          type: string
        position:
          type: string
        joinDate:
          type: string
        avatarInitials:
          type: string
        role:
          type: string
          enum: [employee, admin]
        phone:
          type: ["string", "null"]
        managerId:
          type: ["integer", "null"]
        managerName:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AttendanceRecord:
      type: object
      required: [id, date, status]
      properties:
        id:
          type: integer
        date:
          type: string
        punchIn:
          type: ["string", "null"]
        punchOut:
          type: ["string", "null"]
        status:
          type: string
          enum: [present, absent, half_day, on_leave, holiday, weekend]
        hoursWorked:
          type: ["number", "null"]
        note:
          type: ["string", "null"]

    LeaveRequest:
      type: object
      required: [id, type, startDate, endDate, days, status, reason, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [annual, sick, casual, maternity, paternity, unpaid, other]
        startDate:
          type: string
        endDate:
          type: string
        days:
          type: number
        status:
          type: string
          enum: [pending, approved, rejected, cancelled]
        reason:
          type: string
        createdAt:
          type: string
        approvedBy:
          type: ["string", "null"]
        comments:
          type: ["string", "null"]

    LeaveInput:
      type: object
      required: [type, startDate, endDate, reason]
      properties:
        type:
          type: string
          enum: [annual, sick, casual, maternity, paternity, unpaid, other]
        startDate:
          type: string
        endDate:
          type: string
        reason:
          type: string

    LeaveBalance:
      type: object
      required: [annual, sick, casual, used, remaining]
      properties:
        annual:
          type: number
        sick:
          type: number
        casual:
          type: number
        used:
          type: number
        remaining:
          type: number
        details:
          type: array
          items:
            type: object
            required: [type, total, used, remaining]
            properties:
              type:
                type: string
              total:
                type: number
              used:
                type: number
              remaining:
                type: number

    Holiday:
      type: object
      required: [id, name, date, type]
      properties:
        id:
          type: integer
        name:
          type: string
        date:
          type: string
        type:
          type: string
          enum: [public, company, optional]
        description:
          type: ["string", "null"]
        dayOfWeek:
          type: ["string", "null"]

    AnnouncementItem:
      type: object
      required: [id, title, body, category, priority, type, publishedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        category:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        type:
          type: string
          enum: [announcement, event]
        publishedAt:
          type: string

    AnnouncementsPage:
      type: object
      required: [items, total, page, limit, announcementCount, eventCount]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AnnouncementItem"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        announcementCount:
          type: integer
        eventCount:
          type: integer

    EmployeeRequest:
      type: object
      required: [id, employeeId, type, reason, status, createdAt]
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        type:
          type: string
          enum: [correction, attendance]
        date:
          type: ["string", "null"]
        reason:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        comments:
          type: ["string", "null"]
        createdAt:
          type: string

    RequestInput:
      type: object
      required: [type, reason]
      properties:
        type:
          type: string
          enum: [correction, attendance]
        date:
          type: ["string", "null"]
        reason:
          type: string

    DashboardSummary:
      type: object
      required: [employee, todayAttendance, leaveBalance, upcomingHolidays, recentAttendance, monthlyStats, weeklyHours, recentAnnouncements]
      properties:
        employee:
          $ref: "#/components/schemas/Employee"
        todayAttendance:
          $ref: "#/components/schemas/AttendanceRecord"
        leaveBalance:
          $ref: "#/components/schemas/LeaveBalance"
        upcomingHolidays:
          type: array
          items:
            $ref: "#/components/schemas/Holiday"
        recentAttendance:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceRecord"
        monthlyStats:
          type: object
          required: [presentDays, absentDays, leaveDays, totalWorkingDays, attendanceRate]
          properties:
            presentDays:
              type: integer
            absentDays:
              type: integer
            leaveDays:
              type: integer
            totalWorkingDays:
              type: integer
            attendanceRate:
              type: number
        weeklyHours:
          type: array
          items:
            type: object
            required: [day, hours]
            properties:
              day:
                type: string
              hours:
                type: number
        recentAnnouncements:
          type: array
          items:
            $ref: "#/components/schemas/AnnouncementItem"
